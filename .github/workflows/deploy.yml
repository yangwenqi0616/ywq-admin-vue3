name: 自动部署GitHub Pages

on:
  push:
    branches: [ "master" ]  # 当推送到 master 分支时触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '16'  # 使用 Node.js 16 版本
          cache: 'yarn'  # 使用 Yarn 缓存依赖

      - name: 安装依赖
        run: yarn

      - name: 构建项目
        run: yarn build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  # Vue 项目默认的构建输出目录

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4